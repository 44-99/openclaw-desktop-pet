<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: data:; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* ws://127.0.0.1:* blob:; img-src 'self' data: blob:; media-src 'self' blob:;">
  <title>哈基虾桌面宠物</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 3D 容器 - 只有宠物模型区域能交互 -->
  <div id="canvas-container"></div>
  
  <!-- 对话气泡 -->
  <div id="speech-bubble" class="hidden">
    <div id="bubble-text"></div>
    <div id="bubble-arrow"></div>
  </div>
  
  <!-- 右键菜单 -->
  <div id="context-menu" class="hidden">
    <div class="menu-item" data-action="openclaw">🦞 打开 OpenClaw</div>
    <div class="menu-item" data-action="status">📊 系统状态</div>
    <div class="menu-divider"></div>
    <div class="menu-item" data-action="hide">👻 隐藏</div>
    <div class="menu-item" data-action="quit">❌ 退出哈基虾</div>
  </div>
  
  <!-- 加载指示器 -->
  <div id="loading">
    <div class="loader"></div>
    <div>哈基虾准备中...</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "../node_modules/three/build/three.module.js",
      "three/addons/": "../node_modules/three/examples/jsm/"
    }
  }
  </script>
  
  <script type="module" src="js/app.js"></script>
</body>
</html>
